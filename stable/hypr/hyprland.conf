### MONITORS ###
monitor = eDP-1, 1920x1080@60, 0x0, 1

### PROGRAMS ###
$terminal = kitty
$fileManager = nautilus
$menu = rofi -show drun

### ENV ###
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = LANG,en_US.UTF-8

### SOURCES ###
# These load your other settings
source = ~/.config/hypr/configs/input.conf
source = ~/.config/hypr/configs/keybinds.conf
source = ~/.config/hypr/configs/autostart.conf
source = ~/.config/hypr/user-colors.conf
source = ~/.config/hypr/configs/looknfeel.conf

### GENERAL ###
general {
    border_size = 1
    col.active_border = rgba(ffffffcc) rgba(9ca3af22) 45deg
    col.inactive_border = rgba(1f293711)
    gaps_in = 4
    gaps_out = 8
    layout = dwindle
}

decoration {
    rounding = 14
    blur {
        enabled = true
        size = 12
        passes = 6
        ignore_opacity = true
    }
}

### ANIMATIONS ###
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

### --- THE FIX --- ###
# Copilot Button -> Kitty
bind = SUPER_SHIFT, XF86Assistant, exec, kitty

# Btop on Win + R (Floating)
bind = SUPER, R, exec, kitty --class btop_float -e btop

